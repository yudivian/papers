<div id="usage-backdrop" class="fixed inset-0 bg-slate-900/60 z-[100] hidden backdrop-blur-sm transition-opacity"></div>

<div id="usagePanel"
    class="fixed inset-y-0 right-0 w-full sm:w-96 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-[110] flex flex-col border-l border-slate-200">
    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
        <h2 class="text-xl font-bold text-slate-800 flex items-center">
            <i class="fas fa-chart-pie mr-2 text-blue-600"></i>
            Uso de la Cuenta
        </h2>
        <button id="closeUsageBtn" class="text-slate-400 hover:text-slate-600 text-3xl">&times;</button>
    </div>

    <div class="flex-1 overflow-y-auto p-6 space-y-8">
        <div class="p-4 bg-slate-50 rounded-xl border border-slate-100">
            <div class="flex justify-between items-end mb-2">
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider">Almacenamiento Global</h3>
                <span id="usage-storage-text" class="text-xs font-mono text-slate-700 font-bold">-- / --</span>
            </div>
            <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                <div id="usage-storage-bar" class="bg-blue-600 h-full transition-all duration-700" style="width: 0%">
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="p-4 bg-slate-50 rounded-xl border border-slate-100 text-center">
                <div class="text-2xl font-bold text-slate-800" id="usage-kb-count">0</div>
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">KBs</div>
            </div>
            <div class="p-4 bg-slate-50 rounded-xl border border-slate-100 text-center">
                <div class="text-2xl font-bold text-slate-800" id="usage-doc-count">0</div>
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">Documentos únicos</div>
            </div>
        </div>

        <div class="space-y-4">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider px-1">Cuotas por Fuentes</h3>
            <div id="adapters-usage-list" class="space-y-3">
                <div class="text-xs text-slate-400 italic px-1">Descubriendo fuentes activas...</div>
            </div>
        </div>
    </div>
</div>
