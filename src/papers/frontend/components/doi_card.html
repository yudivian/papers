<div id="doi-component-registry">
    <template id="tpl-doi-card">
        <div class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm transition-all hover:border-blue-300">
            <div class="flex justify-between items-start gap-4">
                <div>
                    <h3 class="js-card-title text-lg font-bold text-slate-800 leading-snug"></h3>
                    <p class="js-card-authors text-sm text-slate-500 mt-1"></p>
                </div>
                <span class="js-card-doi px-2 py-1 bg-slate-50 text-slate-500 text-xs rounded border border-slate-200 font-mono"></span>
            </div>
            <p class="js-card-abstract mt-4 text-sm text-slate-600 leading-relaxed hidden"></p>
            <div class="mt-5 flex gap-3 border-t border-slate-100 pt-4">
                <button class="js-btn-confirm bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-md text-sm font-medium transition-colors">
                    Confirm & Download
                </button>
            </div>
        </div>
    </template>

    <template id="tpl-kb-modal">
        <div id="modal-kb-select" class="fixed inset-0 z-[100] hidden bg-slate-900/60 flex items-center justify-center backdrop-blur-sm">
            <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 border border-slate-200 mx-4">
                <h3 class="text-xl font-bold text-slate-800 mb-2 text-left">Select Destination</h3>
                <p class="text-sm text-slate-500 mb-5 text-left">Where should we store this paper?</p>
                
                <label class="block text-left text-xs font-semibold text-slate-400 uppercase mb-1">Knowledge Base</label>
                <select id="modal-kb-dropdown" class="w-full border border-slate-300 rounded-lg p-2.5 text-slate-700 bg-slate-50 mb-6 outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="" disabled selected>Select a Knowledge Base...</option>
                </select>

                <div class="flex justify-end gap-3">
                    <button id="btn-modal-cancel" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg text-sm font-medium">Cancel</button>
                    <button id="btn-modal-download" disabled class="px-4 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white rounded-lg text-sm font-medium transition-colors shadow-sm">
                        Start Download
                    </button>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-task-item">
        <div class="js-task-card p-3 bg-white border border-slate-200 rounded-lg mb-2 shadow-sm">
            <div class="flex justify-between items-center mb-2">
                <span class="js-task-title font-medium text-slate-700 truncate text-xs pr-2"></span>
                <span class="js-task-status text-[9px] font-bold uppercase px-1.5 py-0.5 rounded bg-slate-100 text-slate-500 border border-slate-200">PENDING</span>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-1 overflow-hidden">
                <div class="js-task-progress bg-blue-500 h-1 transition-all duration-500" style="width: 5%"></div>
            </div>
            <p class="js-task-error text-[10px] text-red-500 mt-2 hidden"></p>
        </div>
    </template>
</div>
