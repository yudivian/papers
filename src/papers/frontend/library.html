<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers AI Engine - Workspace</title>
    <script src="/assets/js/tailwind-browser.js"></script>
    <script src="/assets/js/jquery-4.0.0.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script>requireAuth();</script>


</head>

<body class="bg-slate-50 min-h-screen overflow-x-hidden font-sans">

    <div id="sidebar-container"></div>

    <main class="p-4 md:p-8 ml-0 md:ml-64 relative transition-all duration-300">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-3">
                <button id="openSidebarMobileBtn" class="md:hidden text-slate-600 hover:text-slate-900 p-1">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-slate-800">Workspace</h1>
                    <p class="text-sm md:text-base text-slate-500 mt-1">Manage your knowledge bases and projects.</p>
                </div>
            </div>

            <div class="flex flex-wrap gap-3 items-center w-full md:w-auto">
                <button id="btnNewKB"
                    class="flex-1 md:flex-none bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 px-4 rounded-lg transition-colors shadow-sm">
                    + New Knowledge Base
                </button>
                <div class="bg-white border border-slate-200 px-3 py-2 rounded-lg shadow-sm hidden sm:block">
                    <span class="text-sm text-slate-500">Session:</span>
                    <span id="displayUser"
                        class="ml-1 font-semibold truncate max-w-[120px] inline-block align-bottom text-blue-600"></span>
                </div>
            </div>
        </header>

        <div id="kb-toolbar"
            class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 pb-4 border-b border-slate-200 hidden">
            <div class="relative w-full sm:w-80">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="search" id="kb-search-input" autocomplete="off" placeholder="Search Knowledge Bases..."
                    class="block w-full py-2 pl-10 pr-3 text-sm text-slate-700 border border-slate-200 rounded-lg bg-white focus:ring-2 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none">
            </div>
            <div class="flex items-center space-x-4 overflow-x-auto">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider hidden sm:inline">Sort by:</span>
                <button
                    class="kb-sort-btn text-sm font-bold text-blue-600 flex items-center transition-colors whitespace-nowrap"
                    data-sort="created_at" data-dir="desc">
                    Date <span class="sort-icon ml-1 text-xs font-bold">↓</span>
                </button>
                <button
                    class="kb-sort-btn text-sm font-medium text-slate-500 hover:text-slate-800 flex items-center transition-colors whitespace-nowrap"
                    data-sort="name" data-dir="none">
                    Name <span class="sort-icon ml-1 text-xs font-bold opacity-50">↑</span>
                </button>
                <button
                    class="kb-sort-btn text-sm font-medium text-slate-500 hover:text-slate-800 flex items-center transition-colors whitespace-nowrap"
                    data-sort="docs" data-dir="none">
                    Documents <span class="sort-icon ml-1 text-xs font-bold opacity-50">↓</span>
                </button>
            </div>
        </div>

        <div id="workspace-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
        </div>

        <div id="workspace-detail" class="hidden">
    <div class="mb-8">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
            <div>
                <h2 id="detailTitle" class="text-2xl md:text-3xl font-bold text-slate-800"></h2>
                <p id="detailDesc" class="text-slate-500 mt-2 max-w-3xl"></p>
                <div id="detailDate" class="flex items-center text-[10px] font-bold text-slate-400 uppercase mt-4 tracking-wider"></div>
            </div>
            <div class="flex gap-2">
                <button id="btnEditKB" class="px-4 py-2 bg-white border border-slate-200 text-slate-600 rounded-lg text-sm font-medium hover:bg-slate-50 transition-colors">Edit</button>
                <button id="btnDeleteKB" class="px-4 py-2 bg-red-50 border border-red-100 text-red-600 rounded-lg text-sm font-medium hover:bg-red-100 transition-colors">Delete</button>
            </div>
        </div>

        <div id="doc-header-container" class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 pt-6 border-t border-slate-200 hidden">
            <div class="relative w-full sm:w-80">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
                <input type="search" id="doc-search-input" autocomplete="off" placeholder="Search in this project..." 
                    class="block w-full py-2 pl-10 pr-3 text-sm text-slate-700 border border-slate-200 rounded-lg bg-white focus:ring-2 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none">
            </div>
            
            <div class="flex items-center space-x-4 overflow-x-auto">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider hidden sm:inline">Sort by:</span>
                <button class="doc-sort-btn text-sm font-bold text-blue-600 flex items-center whitespace-nowrap" data-sort="ingested_at" data-dir="desc">
                    Date <span class="sort-icon ml-1 text-xs font-bold">↓</span>
                </button>
                <button class="doc-sort-btn text-sm font-medium text-slate-500 hover:text-slate-800 flex items-center whitespace-nowrap" data-sort="title" data-dir="none">
                    Title <span class="sort-icon ml-1 text-xs font-bold opacity-50">↑</span>
                </button>
                <button class="doc-sort-btn text-sm font-medium text-slate-500 hover:text-slate-800 flex items-center whitespace-nowrap" data-sort="file_size" data-dir="none">
                    Size <span class="sort-icon ml-1 text-xs font-bold opacity-50">↓</span>
                </button>
            </div>
        </div>
    </div>

   <div id="kb-documents-container" class="min-h-[400px] pb-12">
        </div>
</div>
    </main>

    <div id="modalNewKB"
        class="fixed inset-0 bg-slate-900/50 z-50 hidden flex items-center justify-center backdrop-blur-sm p-4">
        <div
            class="bg-white w-full max-w-md rounded-xl shadow-2xl overflow-hidden transform scale-95 transition-transform">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="text-lg font-bold text-slate-800">Create Knowledge Base</h3>
                <button id="btnCloseModal" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
            </div>
            <form id="formNewKB" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Name</label>
                    <input type="text" id="kbName" required
                        class="w-full px-3 py-2 border border-slate-300 rounded-md outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Description (Optional)</label>
                    <textarea id="kbDesc" rows="3"
                        class="w-full px-3 py-2 border border-slate-300 rounded-md outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <div
                    class="pt-4 flex flex-col sm:flex-row justify-between items-center gap-3 border-t border-slate-100">
                    <button type="button" id="btnCancelModal"
                        class="w-full sm:w-auto px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-md">Cancel</button>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <button type="button" id="btnCreateStay"
                            class="flex-1 sm:flex-none px-4 py-2 text-sm font-medium text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-md border border-slate-200">
                            Create & Stay
                        </button>
                        <button type="submit"
                            class="flex-1 sm:flex-none px-4 py-2 text-sm font-medium text-white bg-slate-800 hover:bg-slate-900 rounded-md shadow-sm">
                            Create & Enter
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div id="modalEditKB"
        class="fixed inset-0 bg-slate-900/50 z-50 hidden flex items-center justify-center backdrop-blur-sm p-4">
        <div
            class="bg-white w-full max-w-md rounded-xl shadow-2xl overflow-hidden transform scale-95 transition-transform">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="text-lg font-bold text-slate-800">Edit Knowledge Base</h3>
                <button id="btnCloseEditModal" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
            </div>
            <form id="formEditKB" class="p-6 space-y-4">
                <input type="hidden" id="editKbId">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Name</label>
                    <input type="text" id="editKbName" required
                        class="w-full px-3 py-2 border border-slate-300 rounded-md outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
                    <textarea id="editKbDesc" rows="3"
                        class="w-full px-3 py-2 border border-slate-300 rounded-md outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <div class="pt-4 flex justify-end gap-3 border-t border-slate-100">
                    <button type="button" id="btnCancelEditModal"
                        class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-md">Cancel</button>
                    <button type="submit"
                        class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md shadow-sm">Save
                        Changes</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modalConfirm"
        class="fixed inset-0 bg-slate-900/50 z-[70] hidden flex items-center justify-center backdrop-blur-sm p-4">
        <div
            class="bg-white w-full max-w-sm rounded-xl shadow-2xl overflow-hidden transform scale-95 transition-transform">
            <div class="p-6 text-center">
                <div
                    class="w-16 h-16 rounded-full bg-red-100 text-red-600 flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                        </path>
                    </svg>
                </div>
                <h3 id="confirmTitle" class="text-lg font-bold text-slate-800 mb-2"></h3>
                <p id="confirmMessage" class="text-sm text-slate-500 mb-6"></p>
                <div class="flex gap-3">
                    <button id="btnCancelConfirm"
                        class="flex-1 px-4 py-2 text-sm font-medium text-slate-600 bg-slate-100 rounded-md">Cancel</button>
                    <button id="btnAcceptConfirm"
                        class="flex-1 px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-md">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settingsPanel"
        class="fixed inset-y-0 right-0 w-full sm:w-96 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-[60] flex flex-col border-l border-slate-200">
        <div class="p-4 md:p-6 border-b border-slate-100 flex justify-between items-center">
            <h2 class="text-lg md:text-xl font-bold text-slate-800">System Settings</h2>
            <button id="closeSettingsBtn" class="text-slate-400 hover:text-slate-600 text-3xl">&times;</button>
        </div>
        <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
            <div class="w-full md:w-1/3 h-auto md:h-full bg-slate-50 border-b md:border-b-0 md:border-r border-slate-100 p-2 md:p-4 flex flex-row md:flex-col overflow-x-auto md:overflow-y-auto gap-2"
                id="adapterTabs"></div>
            <div class="w-full md:w-2/3 p-4 md:p-6 overflow-y-auto flex-1" id="dynamicFormContainer"></div>
        </div>
    </div>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/settings.js"></script>
    <script src="/assets/js/ui.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/workspace.js"></script>

    <script>
        $(document).ready(function () {
            $('#displayUser').text(getAuthToken()); //
            UI.loadSidebar();
        });
    </script>
</body>

</html>
