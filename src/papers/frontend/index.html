<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers AI Engine - Discovery</title>
    <script src="/assets/js/tailwind-browser.js"></script>
    <script src="/assets/js/jquery-4.0.0.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script>requireAuth();</script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/settings.js"></script>
</head>

<body class="bg-slate-50 min-h-screen overflow-x-hidden font-sans">

    <div id="sidebar-container"></div>

    <main class="p-4 md:p-8 ml-0 md:ml-64 relative transition-all duration-300">

        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-3">
                <button id="openSidebarMobileBtn" class="md:hidden text-slate-600 hover:text-slate-900 p-1">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-slate-800">Discovery Hub</h1>
                    <p class="text-sm md:text-base text-slate-500 mt-1">Search and ingest papers directly to your
                        Knowledge Bases.</p>
                </div>
            </div>

            <div class="flex flex-wrap gap-3 items-center w-full md:w-auto">
                <div class="bg-white border border-slate-200 px-3 py-2 rounded-lg shadow-sm hidden sm:block">
                    <span class="text-sm text-slate-500">Session:</span>
                    <span id="displayUser"
                        class="ml-1 font-semibold text-slate-800 truncate max-w-[120px] inline-block align-bottom"></span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">

                    <div class="flex border-b border-slate-200 bg-slate-50">
                        <button id="tab-doi"
                            class="flex-1 py-3 text-sm font-bold text-blue-600 border-b-2 border-blue-600 bg-white transition-colors">
                            Exact Match (DOI)
                        </button>
                        <button id="tab-text"
                            class="flex-1 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 transition-colors">
                            Semantic Search (Text)
                        </button>
                    </div>

                    <div class="p-4 md:p-6">
                        <div id="view-doi" class="space-y-4">
                            <label class="block text-sm font-medium text-slate-700">Enter Document Object Identifier
                                (DOI)</label>
                            <div class="flex flex-col sm:flex-row gap-3">
                                <input type="text" id="doi-input" placeholder="e.g., 10.1371/journal.pone.0115069"
                                    class="flex-1 px-3 py-2 border border-slate-300 rounded-md outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                                <button id="btn-search-doi"
                                    class="bg-slate-800 hover:bg-slate-900 text-white px-6 py-2 rounded-md text-sm font-medium transition-colors shadow-sm w-full sm:w-auto">
                                    Resolve DOI
                                </button>
                            </div>
                        </div>

                        <div id="view-text" class="space-y-4 hidden">
                            <div class="flex flex-col sm:flex-row gap-4">
                                <div class="flex-1">
                                    <label class="block text-sm font-medium text-slate-700 mb-1">Search Query</label>
                                    <input type="text" id="text-input" placeholder="Keywords or concepts..."
                                        class="w-full px-3 py-2 border border-slate-300 rounded-md outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                                </div>
                                <div class="w-full sm:w-1/3">
                                    <label class="block text-sm font-medium text-slate-700 mb-1">Target Source</label>
                                    <select id="source-select"
                                        class="w-full px-3 py-2 border border-slate-300 rounded-md outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-white">
                                        <option value="">All Sources (Parallel)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="flex justify-end pt-2">
                                <button id="btn-search-text"
                                    class="bg-slate-800 hover:bg-slate-900 text-white px-6 py-2 rounded-md text-sm font-medium transition-colors shadow-sm w-full sm:w-auto">
                                    Search
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="discovery-results" class="space-y-4"></div>
            </div>

            <div class="lg:col-span-1">
                <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden sticky top-6">
                    <div class="bg-slate-50 border-b border-slate-100 p-4 flex justify-between items-center">
                        <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider flex items-center">
                            <svg class="w-4 h-4 mr-2 text-blue-600" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                            </svg>
                            Active Downloads
                        </h3>
                        <span id="taskLimitsInfo"
                            class="text-xs font-semibold text-slate-500 bg-white border border-slate-200 px-2 py-1 rounded">0
                            / 10</span>
                    </div>
                    <div id="taskList" class="p-2 space-y-2 max-h-[calc(100vh-250px)] overflow-y-auto">
                        <div class="p-6 text-center text-sm text-slate-400">
                            No active tasks.
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="settingsPanel"
        class="fixed inset-y-0 right-0 w-full sm:w-96 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-[60] flex flex-col border-l border-slate-200">
        <div class="p-4 md:p-6 border-b border-slate-100 flex justify-between items-center">
            <h2 class="text-lg md:text-xl font-bold text-slate-800">System Settings</h2>
            <button id="closeSettingsBtn" class="text-slate-400 hover:text-slate-600 text-3xl">&times;</button>
        </div>
        <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
            <div class="w-full md:w-1/3 h-auto md:h-full bg-slate-50 border-b md:border-b-0 md:border-r border-slate-100 p-2 md:p-4 flex flex-row md:flex-col overflow-x-auto md:overflow-y-auto gap-2"
                id="adapterTabs"></div>
            <div class="w-full md:w-2/3 p-4 md:p-6 overflow-y-auto flex-1" id="dynamicFormContainer"></div>
        </div>
    </div>

    <script src="/assets/js/ui.js"></script>
    <script src="/assets/js/discovery.js"></script>
    <script>
        $(document).ready(function () {
            $('#displayUser').text(getAuthToken()); //
            UI.loadSidebar(); // Carga centralizada y limpia
        });
    </script>

</body>

</html>
