<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers AI Engine - Discovery</title>
    <script src="/assets/js/tailwind-browser.js"></script>
    <script src="/assets/js/jquery-4.0.0.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script>requireAuth();</script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/settings.js"></script>
</head>

<body class="bg-slate-50 min-h-screen overflow-x-hidden font-sans">

    <div id="sidebar-container"></div>

    <main class="p-4 md:p-8 ml-0 md:ml-64 relative transition-all duration-300">

        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-3">
                <button id="openSidebarMobileBtn" class="md:hidden text-slate-600 hover:text-slate-900 p-1">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-slate-800">Discovery Hub</h1>
                    <p class="text-sm md:text-base text-slate-500 mt-1">Search and ingest papers directly to your
                        Knowledge Bases.</p>
                </div>
            </div>

            <div class="flex flex-wrap gap-3 items-center w-full md:w-auto">
                <div class="bg-white border border-slate-200 px-3 py-2 rounded-lg shadow-sm hidden sm:block">
                    <span class="text-sm text-slate-500">Session:</span>
                    <span id="displayUser"
                        class="ml-1 font-semibold truncate max-w-[120px] inline-block align-bottom text-blue-600"></span>
                </div>
            </div>
        </header>

       <div class="space-y-6">

            
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm mb-6">

                    <div class="flex space-x-6 border-b border-slate-100 mb-6">
                        <button id="tab-btn-doi"
                            class="pb-3 text-sm font-bold border-b-2 border-blue-600 text-blue-600 transition-colors">
                            Search by DOI
                        </button>
                        <button id="tab-btn-text"
                            class="pb-3 text-sm font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-800 transition-colors">
                            Search by Text
                        </button>
                    </div>

                    <div id="tab-content-doi" class="block">
                        <div class="flex flex-col sm:flex-row gap-3">
                            <input type="text" id="doi-input" placeholder="e.g. 10.1038/s41586-020-2649-2"
                                class="flex-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all">
                            <button id="btn-search-doi"
                                class="px-6 py-3 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-lg shadow-md transition-all flex items-center justify-center gap-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                </svg>
                                Find DOI
                            </button>
                        </div>
                    </div>

                    <div id="tab-content-text" class="hidden">
                        <div class="flex flex-col gap-4">
                            <div class="flex flex-col sm:flex-row gap-3">
                                <input type="text" id="text-search-input"
                                    placeholder="e.g. Multimodal Language Models..."
                                    class="flex-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all">

                                <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-lg px-3"
                                    title="Max results per source">
                                    <span class="text-xs font-bold text-slate-400 mr-2">LIMIT</span>
                                    <input type="number" id="search-limit-input" value="10" min="1" max="50"
                                        class="w-16 py-3 bg-transparent text-slate-700 font-semibold focus:outline-none text-center">
                                </div>

                                <button id="btn-search-text"
                                    class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-md transition-all flex items-center justify-center gap-2">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                    </svg>
                                    Discover
                                </button>
                            </div>

                            <div class="flex flex-wrap items-center gap-4 px-1" id="sources-checkboxes-container">
                                <label
                                    class="flex items-center gap-2 text-sm font-bold text-slate-700 cursor-pointer select-none">
                                    <input type="checkbox" id="chk-all-sources"
                                        class="rounded border-slate-300 text-blue-600 focus:ring-blue-500" checked>
                                    All Sources
                                </label>
                                <div class="h-4 w-px bg-slate-300"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="discovery-results" class="space-y-4"></div>


            

        </div>
    </main>

    <div id="settingsPanel"
        class="fixed inset-y-0 right-0 w-full sm:w-96 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-[60] flex flex-col border-l border-slate-200">
        <div class="p-4 md:p-6 border-b border-slate-100 flex justify-between items-center">
            <h2 class="text-lg md:text-xl font-bold text-slate-800">System Settings</h2>
            <button id="closeSettingsBtn" class="text-slate-400 hover:text-slate-600 text-3xl">&times;</button>
        </div>
        <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
            <div class="w-full md:w-1/3 h-auto md:h-full bg-slate-50 border-b md:border-b-0 md:border-r border-slate-100 p-2 md:p-4 flex flex-row md:flex-col overflow-x-auto md:overflow-y-auto gap-2"
                id="adapterTabs"></div>
            <div class="w-full md:w-2/3 p-4 md:p-6 overflow-y-auto flex-1" id="dynamicFormContainer"></div>
        </div>
    </div>

    <script src="/assets/js/ui.js"></script>
    <script src="/assets/js/discovery.js"></script>
    <!-- <script>
        $(document).ready(function () {
            $('#displayUser').text(getAuthToken()); //
            UI.loadSidebar();
        });
    </script> -->

</body>

</html>
