<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My ORCID Profile - Papers</title>
    <script src="/assets/js/tailwind-browser.js"></script>
    <script src="/assets/js/jquery-4.0.0.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script>requireAuth();</script>
</head>
<body class="bg-slate-50 min-h-screen overflow-x-hidden font-sans">

    <div id="sidebar-container"></div>

    <main class="p-4 md:p-8 ml-0 md:ml-64 relative transition-all duration-300">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-3">
                <button id="openSidebarMobileBtn" class="md:hidden text-slate-600 hover:text-slate-900 p-1">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-slate-800">My ORCID Profile</h1>
                    <p class="text-sm md:text-base text-slate-500 mt-1">Manage and view your ORCID synchronization.</p>
                </div>
            </div>

            <div class="flex flex-wrap gap-3 items-center w-full md:w-auto">
                <div class="bg-white border border-slate-200 px-3 py-2 rounded-lg shadow-sm hidden sm:block">
                    <span class="text-sm text-slate-500">Session:</span>
                    <span id="displayUser" class="ml-1 font-semibold text-blue-600"></span>
                </div>
            </div>
        </header>

        <div id="profile-container" class="w-full">
            
            <div id="orcid-loading" class="flex items-center gap-3 text-slate-500 animate-pulse mt-4">
                <svg class="w-6 h-6 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <span class="font-medium">Loading Data from ORCID...</span>
            </div>

            <div id="orcid-content" class="hidden pb-12 w-full">
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 md:p-8 mb-6 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-green-50 rounded-bl-full -mr-8 -mt-8 z-0"></div>
                    <div class="relative z-10 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <h1 id="prof-name" class="text-3xl font-bold text-slate-900 tracking-tight"></h1>
                            <div class="flex items-center gap-2 mt-2 text-sm">
                                <svg class="w-5 h-5 text-[#A6CE39]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm-4.63 17.265H5.106V7.47h2.264v9.795zM6.238 6.417a1.32 1.32 0 11.002-2.64 1.32 1.32 0 01-.002 2.64zm10.738 10.848c-3.155 0-4.322-2.094-4.322-4.908 0-3.036 1.38-4.945 4.195-4.945 1.554 0 2.593.606 3.018 1.13v-1.04h2.15v9.52h-2.15v-1.127c-.443.553-1.465 1.37-2.891 1.37zm1.185-8.03c-1.413 0-2.318 1.157-2.318 3.122 0 1.83.826 3.07 2.318 3.07 1.413 0 2.296-1.16 2.296-3.07 0-1.94-.883-3.122-2.296-3.122z"/></svg>
                                <a href="#" id="prof-orcid-link" target="_blank" class="text-blue-600 hover:underline font-mono"></a>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-full text-xs font-medium text-slate-600">
                            <span id="prof-sync-indicator" class="w-2 h-2 rounded-full bg-slate-300"></span>
                            <span id="prof-sync-text">Synchronized</span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="col-span-1 space-y-6">
                        <div id="prof-bio-section" class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 hidden">
                            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Biography</h2>
                            <p id="prof-bio" class="text-sm text-slate-600 whitespace-pre-line"></p>
                        </div>
                        <div id="prof-keywords-section" class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 hidden">
                            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Keywords</h2>
                            <div id="prof-keywords" class="flex flex-wrap gap-2"></div>
                        </div>
                        <div id="prof-links-section" class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 hidden">
                            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Web Links</h2>
                            <ul id="prof-links" class="space-y-2 text-sm"></ul>
                        </div>
                    </div>

                    <div class="col-span-1 lg:col-span-2 space-y-8">
                        <div id="prof-affiliations-section" class="hidden">
                            <h2 class="text-lg font-bold text-slate-900 border-b border-slate-200 pb-2 mb-4">Trajectory</h2>
                            <div id="prof-affiliations" class="space-y-3"></div>
                        </div>
                        <div id="prof-works-section" class="hidden">
                            <div class="flex items-center justify-between border-b border-slate-200 pb-2 mb-4">
                                <h2 class="text-lg font-bold text-slate-900">Publications</h2>
                                <span id="prof-works-count" class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded text-xs font-bold">0</span>
                            </div>
                            <div id="prof-works" class="space-y-4"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="orcid-error" class="hidden flex-col items-center justify-start mt-10 text-center">
                <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm max-w-md w-full">
                    <svg class="w-16 h-16 text-slate-300 mb-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    <h2 class="text-xl font-semibold text-slate-800 mb-2">Profile Not Available</h2>
                    <p class="text-slate-500 mb-6" id="orcid-error-text"></p>
                    <button id="btnOpenSettingsFromError" class="w-full px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-bold transition-all">Go to Settings</button>
                </div>
            </div>
        </div>
    </main>

    <div id="settingsPanel" class="fixed inset-y-0 right-0 w-full sm:w-96 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-[60] flex flex-col border-l border-slate-200">
        <div class="p-4 md:p-6 border-b border-slate-100 flex justify-between items-center">
            <h2 class="text-lg md:text-xl font-bold text-slate-800">System Settings</h2>
            <button id="closeSettingsBtn" class="text-slate-400 hover:text-slate-600 text-3xl">&times;</button>
        </div>
        <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
            <div class="w-full md:w-1/3 h-auto md:h-full bg-slate-50 border-b md:border-b-0 md:border-r border-slate-100 p-2 md:p-4 flex flex-row md:flex-col overflow-x-auto md:overflow-y-auto gap-2" id="adapterTabs"></div>
            <div class="w-full md:w-2/3 p-4 md:p-6 overflow-y-auto flex-1" id="dynamicFormContainer"></div>
        </div>
    </div>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/settings.js"></script>
    <script src="/assets/js/ui.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/workspace.js"></script>
    <script src="/assets/js/orcid_profile.js"></script>
    
    <script>
        $(document).ready(function () {
            if (typeof getAuthToken === 'function') {
                $('#displayUser').text(getAuthToken()); 
            }
        });
    </script>
</body>
</html>
