<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Ciencia - Autenticación</title>
    <script src="/assets/js/tailwind-browser.js"></script>
    <script src="/assets/js/jquery-4.0.0.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script>
        redirectIfAuthenticated();
    </script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-xl shadow-xl p-6 md:p-8 border border-slate-100">
        <div class="mb-8 text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Plataforma de Ciencia - UH</h1>
            <p class="text-sm text-slate-500 mt-2">Portal de Autenticación</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label for="userId" class="block text-sm font-medium text-slate-700 mb-1.5">ID de Usuario</label>
                <input type="text" id="userId" name="userId" required
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-400"
                    placeholder="e.g. yudivian">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">Contraseña</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-400"
                    placeholder="••••••••">
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-all duration-200 shadow-md shadow-blue-100 active:scale-[0.98]">
                Acceder al Espacio de Trabajo
            </button>
        </form>
        
        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <p class="text-xs text-slate-400 uppercase tracking-widest font-semibold">Entorno Local Activo</p>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            $('#loginForm').on('submit', function(e) {
                e.preventDefault();
                const userId = $('#userId').val().trim();
                const password = $('#password').val().trim();
                
                if (userId && password) {
                    loginUser(userId, password);
                }
            });
        });
    </script>
</body>
</html>
