# General system identity and environment
app:
  environment: "development"
  log_level: "INFO"
  server:
    host: "0.0.0.0"
    port: 8000

# Local SQLite-based metadata and vector store
database:
  file: "papers.db"

# Storage configuration
storage:
  selected: "local"
  local:
    base_path: "./data/"

# Data sources and search priority
data_sources:
  priority: 
    - "cache"
    - "openalex"
  openalex:
    base_url: "https://api.openalex.org/works"
    system_keys: 
      - "d1"
      - "d2"
    daily_search_limit: 10
    allow_system_fallback: true
  core:
    base_url: "https://api.core.ac.uk/v3/search/works"
    system_keys:
      - "dummy_core_key_1" 
      - "dummy_core_key_2"
    daily_search_limit: 20
    allow_system_fallback: true
    rate_limit_pause_seconds: 10

# Logical limits
quotas:
  user_logical_limit_gb: 1
  max_concurrent_tasks: 10

# Multilingual Semantic Search
search:
  # Paraphrase Multilingual MiniLM is small, fast, and supports 50+ languages
  model_name: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"